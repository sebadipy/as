<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prueba OneSignal Push</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 5px; }
    .caja-id { margin-top: 20px; padding: 15px; background-color: #f1f1f1; display: inline-block; border-radius: 5px; }
  </style>

  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "a8fdac83-0195-4d2e-95ec-8ce85bf1b69f",
        // Configuración para que el prompt se vea amigable
        promptOptions: {
          slidedown: {
            prompts: [{ type: "push", autoPrompt: false }]
          }
        }
      });

      // Si ya entraste antes y estás suscrito, te muestra el ID de una
      if (OneSignal.User.PushSubscription.id) {
        document.getElementById('resultado-id').innerText = OneSignal.User.PushSubscription.id;
      }

      // Escuchador: detecta el momento exacto en que el usuario toca "Permitir"
      OneSignal.User.PushSubscription.addEventListener("change", function(current) {
        if (current.optedIn) {
          document.getElementById('resultado-id').innerText = current.id;
        } else {
          document.getElementById('resultado-id').innerText = "Usuario no suscrito / Permiso denegado.";
        }
      });
    });

    // Función que dispara el botón
    function pedirPermiso() {
      OneSignalDeferred.push(function(OneSignal) {
        OneSignal.Slidedown.promptPush();
      });
    }
  </script>
</head>
<body>

  <h2>Prueba de Notificaciones Push</h2>
  <p>Tocá el botón para pedirle permiso al navegador.</p>
  
  <button onclick="pedirPermiso()">Suscribirme a las notificaciones</button>

  <div class="caja-id">
    <strong>Tu Subscription ID es:</strong><br><br>
    <span id="resultado-id" style="color: #d9534f; font-weight: bold;">Esperando acción...</span>
  </div>

</body>
</html>
